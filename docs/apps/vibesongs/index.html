<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lyric Whisperer — NLP Playlist Demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFF8FB;
    --panel:#FFFFFF;
    --panel-2:#F8EFFF;
    --pink:#FFA9D9;
    --pink-dark:#E0559E;
    --yellow:#FFE08A;
    --yellow-dark:#C98A12;
    --teal:#9CF3E0;
    --teal-dark:#0E9C86;
    --purple:#C9B6FF;
    --purple-dark:#7C4FE0;
    --text:#3D2C5C;
    --muted:#8E7FAE;
    --line:#EDDFFC;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 8% 8%, rgba(255,169,217,0.45), transparent 40%),
      radial-gradient(circle at 92% 15%, rgba(156,243,224,0.45), transparent 42%),
      radial-gradient(circle at 50% 100%, rgba(201,182,255,0.45), transparent 45%),
      var(--bg);
    color:var(--text);
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    padding:32px 20px 80px;
  }
  .wrap{max-width:980px;margin:0 auto;}

  header{text-align:center;margin-bottom:36px;}
  .eyebrow{
    display:inline-flex;align-items:center;gap:8px;
    font-family:'JetBrains Mono',monospace;font-size:12px;
    letter-spacing:.12em;text-transform:uppercase;color:var(--teal-dark);
    background:rgba(14,156,134,0.10);border:1px solid rgba(14,156,134,0.35);
    padding:6px 14px;border-radius:999px;margin-bottom:18px;
  }
  h1{
    font-family:'Baloo 2',cursive;font-weight:800;
    font-size:clamp(34px,6vw,58px);margin:0 0 10px;line-height:1.05;
    background:linear-gradient(90deg,var(--pink-dark),var(--purple-dark) 50%,var(--teal-dark));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .sub{color:var(--muted);font-size:16px;max-width:600px;margin:0 auto;}
  .db-note{margin-top:12px;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--purple-dark);}

  .tabs{display:flex;justify-content:center;gap:10px;margin:32px 0 18px;flex-wrap:wrap;}
  .tab{
    font-family:'Baloo 2',cursive;font-weight:700;font-size:16px;
    padding:10px 22px;border-radius:999px;border:2px solid var(--line);
    background:var(--panel);color:var(--muted);cursor:pointer;transition:.2s;
  }
  .tab.active{border-color:var(--pink-dark);color:var(--text);
    background:linear-gradient(135deg,rgba(255,169,217,0.45),rgba(201,182,255,0.45));
    box-shadow:0 0 0 4px rgba(255,169,217,0.25);
  }
  .tab:hover{color:var(--text);}

  .search-row{display:flex;justify-content:center;margin-bottom:18px;}
  .search-box{
    width:100%;max-width:420px;font-family:'Poppins',sans-serif;font-size:14px;
    padding:10px 16px;border-radius:999px;border:2px solid var(--line);background:var(--panel);
    color:var(--text);outline:none;
  }
  .search-box:focus{border-color:var(--purple-dark);}

  .grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));
    gap:12px;margin-bottom:8px;
  }
  .song-card{
    background:var(--panel);border:2px solid var(--line);border-radius:16px;
    padding:14px 16px;cursor:pointer;text-align:left;transition:.18s;
    display:flex;flex-direction:column;gap:2px;
    box-shadow:0 2px 10px rgba(124,79,224,0.06);
  }
  .song-card:hover{transform:translateY(-3px);border-color:var(--purple-dark);}
  .song-card.selected{
    border-color:var(--yellow-dark);
    background:linear-gradient(135deg,rgba(255,224,138,0.35),rgba(255,169,217,0.25));
    box-shadow:0 6px 20px rgba(255,224,138,0.35);
  }
  .song-title{font-weight:600;font-size:14.5px;}
  .song-artist{font-size:12px;color:var(--muted);}

  .run-row{display:flex;justify-content:center;margin:30px 0 10px;}
  .run-btn{
    font-family:'Baloo 2',cursive;font-weight:700;font-size:18px;
    padding:14px 34px;border-radius:999px;border:none;cursor:pointer;
    background:linear-gradient(90deg,var(--pink-dark),var(--purple-dark));color:white;
    box-shadow:0 8px 26px rgba(224,85,158,0.35);transition:.2s;
  }
  .run-btn:disabled{
    background:var(--panel-2);color:var(--muted);box-shadow:none;cursor:not-allowed;
  }
  .run-btn:not(:disabled):hover{transform:translateY(-2px) scale(1.02);}

  .pipeline{margin-top:38px;display:flex;flex-direction:column;gap:18px;}
  .step{
    background:var(--panel);border:2px solid var(--line);border-radius:20px;
    padding:22px 24px;opacity:0;transform:translateY(16px);
    transition:opacity .5s ease, transform .5s ease;
    box-shadow:0 2px 14px rgba(124,79,224,0.06);
  }
  .step.show{opacity:1;transform:translateY(0);}
  .step-head{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .step-num{
    font-family:'JetBrains Mono',monospace;font-size:12px;color:white;
    background:var(--teal-dark);width:28px;height:28px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;
  }
  .step-title{font-family:'Baloo 2',cursive;font-weight:700;font-size:19px;}
  .step-quip{color:var(--muted);font-size:13.5px;margin:-8px 0 14px 40px;}

  .chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-left:40px;}
  .chip{
    font-family:'JetBrains Mono',monospace;font-size:12.5px;
    padding:6px 12px;border-radius:8px;background:var(--panel-2);
    border:1px solid var(--line);color:var(--text);
  }
  .chip.fade{opacity:.4;text-decoration:line-through;}
  .chip.signal{border-color:var(--pink-dark);color:var(--pink-dark);font-weight:700;background:rgba(255,169,217,0.18);}
  .row-label{font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:12px 0 6px 40px;}

  .tagline-box{
    margin-left:40px;background:var(--panel-2);border-left:3px solid var(--purple-dark);
    border-radius:8px;padding:10px 14px;font-size:13.5px;color:var(--muted);font-style:italic;
    margin-bottom:14px;
  }

  .pill{
    display:inline-block;font-weight:600;font-size:14px;padding:7px 16px;
    border-radius:999px;margin:2px 6px 2px 0;
  }
  .pill-theme{background:rgba(201,182,255,0.35);color:var(--purple-dark);border:1px solid var(--purple);}
  .pill-mood{background:rgba(255,169,217,0.35);color:var(--pink-dark);border:1px solid var(--pink);}
  .pill-emotion{background:rgba(255,224,138,0.45);color:var(--yellow-dark);border:1px solid var(--yellow);}
  .pill-keyword{background:rgba(156,243,224,0.40);color:var(--teal-dark);border:1px solid var(--teal);}

  .pill-row{margin-left:40px;display:flex;flex-wrap:wrap;gap:2px;}

  .output{
    margin-top:8px;border-radius:22px;padding:28px;
    background:linear-gradient(135deg,rgba(255,169,217,0.30),rgba(156,243,224,0.30));
    border:2px solid var(--yellow-dark);
  }
  .output h2{font-family:'Baloo 2',cursive;margin:0 0 4px;font-size:24px;}
  .output .sub2{color:var(--muted);font-size:13.5px;margin-bottom:18px;}
  .formula-box{
    background:var(--panel);border:1px dashed var(--purple-dark);border-radius:12px;
    padding:12px 16px;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--text);
    margin-bottom:20px;line-height:1.7;
  }
  .formula-box b{color:var(--purple-dark);}
  .playlist-card{
    display:flex;align-items:center;gap:16px;background:var(--panel);
    border-radius:16px;padding:16px 18px;margin-bottom:20px;border:1px solid var(--line);
  }
  .art{
    width:56px;height:56px;border-radius:12px;flex-shrink:0;
    background:linear-gradient(135deg,var(--pink),var(--purple),var(--teal));
    display:flex;align-items:center;justify-content:center;font-size:24px;
  }
  .playlist-name{font-family:'Baloo 2',cursive;font-weight:700;font-size:18px;}
  .playlist-desc{color:var(--muted);font-size:13px;}
  .sim-title{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.08em;
    text-transform:uppercase;color:var(--teal-dark);margin-bottom:12px;}

  .match-card{background:var(--panel);border-radius:14px;padding:16px 18px;margin-bottom:12px;border:1px solid var(--line);}
  .match-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;gap:10px;}
  .match-name{font-weight:600;font-size:14.5px;}
  .match-artist{color:var(--muted);font-size:12px;display:block;}
  .match-pct{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:17px;flex-shrink:0;}
  .pct-strong{color:var(--teal-dark);}
  .pct-good{color:var(--pink-dark);}
  .pct-loose{color:var(--muted);}
  .bar-track{height:8px;border-radius:99px;background:var(--panel-2);overflow:hidden;margin-bottom:10px;}
  .bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--pink-dark),var(--teal-dark));width:0%;transition:width .8s ease;}
  .reason-list{display:flex;flex-wrap:wrap;gap:6px;}
  .reason-chip{font-size:11.5px;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:4px 9px;color:var(--muted);}
  .reason-chip b{color:var(--text);font-family:'JetBrains Mono',monospace;}

  .hint{text-align:center;color:var(--muted);font-size:13px;margin-top:10px;}

  @media (max-width:520px){
    .step-quip,.chip-row,.pill-row,.tagline-box,.row-label{margin-left:0;}
    .step-head{gap:10px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">🎧 how streaming apps read your feelings</div>
    <h1>Lyric Whisperer</h1>

    <div class="db-note" id="dbNote"></div>
  </header>

  <div class="tabs">
    <button class="tab active" data-lang="en">🇬🇧 English · Trending Catalog</button>

  </div>

  <div class="search-row">

  </div>

  <div class="grid" id="songGrid"></div>

  <div class="run-row">
    <button class="run-btn" id="runBtn" disabled>Pick a song first 🎵</button>
  </div>
  <p class="hint" id="hint">Tap a song above to load it into the model.</p>

  <div class="pipeline" id="pipeline"></div>

</div>

/* =========================================================
   TOKENIZER — a small, honest NLP pipeline demo:
   1) split on whitespace after stripping punctuation
   2) lowercase every token
   3) flag stopwords vs. "signal" (emotionally loaded) tokens
   ========================================================= */
const STOPWORDS = new Set(['a','an','the','is','are','was','were','be','been','to','of','in','on','and','it',
  'i','my','me','you','your','that','this','with','for','just','so','but','at','as','we','us','our',
  'than','then','there','here','if','not','no','do','did','does','she','he','they','them','once',
  'when','what','who','how','still','has','have','had','into','out','more','even','only','it\'s']);

function tokenize(text){
  const rawWords = text.replace(/[.,!?;:"'’]/g,'').split(/\s+/).filter(Boolean);
  return rawWords.map(w => ({ word: w, norm: w.toLowerCase(), stop: STOPWORDS.has(w.toLowerCase()) }));
}

/* =========================================================
   SIMILARITY ENGINE — every recommendation gets a transparent,
   additive percentage score built from four weighted signals.
   Max theoretical score is capped at 99% (never claim identity
   unless it's literally the same track).
   ========================================================= */
function stripEmoji(str){
  return str.replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}\u{2000}-\u{206F}]/gu,'').trim();
}

const THEME_STOP = new Set(['a','and','the','of','&','with','for','to','in','on']);

function similarity(a, b){
  let score = 0;
  const reasons = [];

  // Signal 1: mood match — up to 35%
  if (a.mood === b.mood) {
    score += 35;
    reasons.push({ label: `Same mood — "${b.mood}"`, pts: 35 });
  }

  // Signal 2: shared emotion tags — up to 30% (15% per shared emotion)
  const aE = a.emotions.map(e => stripEmoji(e).toLowerCase());
  const bE = b.emotions.map(e => stripEmoji(e).toLowerCase());
  const sharedE = aE.filter(e => bE.includes(e));
  if (sharedE.length) {
    const pts = Math.min(30, sharedE.length * 15);
    score += pts;
    reasons.push({ label: `${sharedE.length} shared emotion${sharedE.length>1?'s':''} (${sharedE.join(', ')})`, pts });
  }

  // Signal 3: shared lyrical keywords — up to 25% (12% per shared keyword)
  const sharedK = a.keywords.filter(k => b.keywords.includes(k));
  if (sharedK.length) {
    const pts = Math.min(25, sharedK.length * 12);
    score += pts;
    reasons.push({ label: `${sharedK.length} shared keyword${sharedK.length>1?'s':''} (#${sharedK.join(', #')})`, pts });
  }

  // Signal 4: theme word overlap — up to 10% (5% per shared theme word)
  const aT = a.theme.toLowerCase().split(/[\s,]+/).filter(w => w && !THEME_STOP.has(w));
  const bT = b.theme.toLowerCase().split(/[\s,]+/).filter(w => w && !THEME_STOP.has(w));
  const sharedT = aT.filter(w => bT.includes(w));
  if (sharedT.length) {
    const pts = Math.min(10, sharedT.length * 5);
    score += pts;
    reasons.push({ label: `Theme overlap ("${sharedT.join('", "')}")`, pts });
  }

  // Signal 5: same destination playlist — flat 10% bonus
  if (a.playlist === b.playlist) {
    score += 10;
    reasons.push({ label: `Both already live in "${b.playlist}"`, pts: 10 });
  }

  return { score: Math.min(99, score), reasons };
}

function recommend(selected, catalog, topN = 3){
  const scored = catalog
    .filter(s => s.title !== selected.title)
    .map(s => ({ song: s, ...similarity(selected, s) }))
    .sort((a, b) => b.score - a.score);
  return scored.slice(0, topN);
}

function scoreClass(score){
  if (score >= 65) return 'pct-strong';
  if (score >= 35) return 'pct-good';
  return 'pct-loose';
}
function scoreLabel(score){
  if (score >= 65) return 'Strong match';
  if (score >= 35) return 'Good match';
  return 'Loose match';
}

/* ========================================================= */

let currentLang = 'en';
let selectedSong = null;
let searchTerm = '';

const grid = document.getElementById('songGrid');
const runBtn = document.getElementById('runBtn');
const hint = document.getElementById('hint');
const pipeline = document.getElementById('pipeline');
const tabs = document.querySelectorAll('.tab');
const searchBox = document.getElementById('searchBox');
const dbNote = document.getElementById('dbNote');

function totalSongCount(){
  return SONGS.en.length + SONGS.hi.length;
}
dbNote.textContent = `Catalog: ${totalSongCount()} songs indexed (${SONGS.en.length} English · ${SONGS.hi.length} Hindi)`;

function renderGrid(){
  grid.innerHTML = '';
  const list = SONGS[currentLang].filter(s => {
    const q = searchTerm.toLowerCase();
    return !q || s.title.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q);
  });
  if (!list.length) {
    grid.innerHTML = `<p style="color:var(--muted);grid-column:1/-1;text-align:center;">No songs match "${searchTerm}" in this catalog.</p>`;
    return;
  }
  list.forEach((s) => {
    const card = document.createElement('button');
    card.className = 'song-card';
    if (selectedSong && selectedSong.title === s.title) card.classList.add('selected');
    card.innerHTML = `<span class="song-title">${s.title}</span><span class="song-artist">${s.artist}</span>`;
    card.addEventListener('click', () => selectSong(s, card));
    grid.appendChild(card);
  });
}

function selectSong(song, el){
  document.querySelectorAll('.song-card').forEach(c => c.classList.remove('selected'));
  if (el) el.classList.add('selected');
  selectedSong = song;
  runBtn.disabled = false;
  runBtn.textContent = `Run the NLP pipeline on "${selectedSong.title}" ✨`;
  hint.textContent = 'Model loaded. Hit the button and watch it work.';
  pipeline.innerHTML = '';
}

tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    tabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentLang = tab.dataset.lang;
    selectedSong = null;
    searchTerm = '';
    searchBox.value = '';
    runBtn.disabled = true;
    runBtn.textContent = 'Pick a song first 🎵';
    hint.textContent = 'Tap a song above to load it into the model.';
    pipeline.innerHTML = '';
    renderGrid();
  });
});

searchBox.addEventListener('input', (e) => {
  searchTerm = e.target.value;
  renderGrid();
});

renderGrid();
runBtn.addEventListener('click', runPipeline);

function tokenChipsRow(tokens, mode){
  return tokens.map(t => {
    if (mode === 'raw') return `<span class="chip">${t.word}</span>`;
    const cls = t.stop ? 'chip fade' : 'chip signal';
    return `<span class="${cls}">${t.norm}</span>`;
  }).join('');
}

function runPipeline(){
  if (!selectedSong) return;
  runBtn.disabled = true;
  pipeline.innerHTML = '';
  hint.textContent = 'Model is thinking... 🧠';

  const s = selectedSong;
  const tokens = tokenize(s.vibe);
  const signalCount = tokens.filter(t => !t.stop).length;

  const steps = [
    {
      title: 'Step 1 · Tokenize the lyrics',
      quip: 'Split on whitespace, strip punctuation — this is what the model actually reads.',
      body: `<div class="tagline-box">Model input (vibe summary): "${s.vibe}"</div>
             <div class="row-label">Raw tokens (${tokens.length})</div>
             <div class="chip-row">${tokenChipsRow(tokens, 'raw')}</div>
             <div class="row-label">Lowercased + stopword filter → ${signalCount} signal token${signalCount!==1?'s':''} kept, rest discarded</div>
             <div class="chip-row">${tokenChipsRow(tokens, 'norm')}</div>`
    },
    {
      title: 'Step 2 · Detect the theme',
      quip: 'Zooms out from individual words to "what is this song actually about."',
      body: `<div class="pill-row"><span class="pill pill-theme">🎯 ${s.theme}</span></div>`
    },
    {
      title: 'Step 3 · Read the mood & emotions',
      quip: 'Same as reading a room — but the room is three minutes of audio.',
      body: `<div class="pill-row">
               <span class="pill pill-mood">🌈 Mood: ${s.mood}</span>
             </div>
             <div class="pill-row" style="margin-top:8px;">
               ${s.emotions.map(e => `<span class="pill pill-emotion">${e}</span>`).join('')}
             </div>`
    },
    {
      title: 'Step 4 · Pull out the keywords',
      quip: 'The words doing the heaviest emotional lifting get flagged for matching.',
      body: `<div class="pill-row">${s.keywords.map(k => `<span class="pill pill-keyword">#${k}</span>`).join('')}</div>`
    }
  ];

  steps.forEach((st, idx) => {
    const div = document.createElement('div');
    div.className = 'step';
    div.innerHTML = `
      <div class="step-head">
        <span class="step-num">${idx+1}</span>
        <span class="step-title">${st.title}</span>
      </div>
      <div class="step-quip">${st.quip}</div>
      ${st.body}
    `;
    pipeline.appendChild(div);
    setTimeout(() => div.classList.add('show'), 250 + idx*550);
  });

  setTimeout(() => {
    const catalog = SONGS[currentLang];
    const matches = recommend(s, catalog, 3);

    const out = document.createElement('div');
    out.className = 'step';
    out.innerHTML = `
      <div class="step-head">
        <span class="step-num">5</span>
        <span class="step-title">Step 5 · Score the catalog & recommend</span>
      </div>
      <div class="step-quip">Every other track in this ${catalog.length}-song catalog gets compared against "${s.title}" and scored.</div>
      <div class="output">
        <h2>Playlist decision 🎉</h2>
        <div class="sub2">Theme, mood, emotions, and keywords turn into an actual placement — here's the math behind it.</div>

        <div class="formula-box">
          <b>match% =</b> mood match (35%) + shared emotions (≤30%, 15% each)<br>
          &nbsp;&nbsp;&nbsp;&nbsp;+ shared keywords (≤25%, 12% each) + theme word overlap (≤10%, 5% each)<br>
          &nbsp;&nbsp;&nbsp;&nbsp;+ same-playlist bonus (10%) — capped at 99%
        </div>

        <div class="playlist-card">
          <div class="art">🎧</div>
          <div>
            <div class="playlist-name">Added to: ${s.playlist}</div>
            <div class="playlist-desc">${s.desc}</div>
          </div>
        </div>

        <div class="sim-title">Because you liked "${s.title}", here's what's queued next</div>
        <div id="matchList"></div>
      </div>
    `;
    pipeline.appendChild(out);
    setTimeout(() => out.classList.add('show'), 60);

    const matchList = out.querySelector('#matchList');
    matches.forEach((m, i) => {
      const card = document.createElement('div');
      card.className = 'match-card';
      const cls = scoreClass(m.score);
      card.innerHTML = `
        <div class="match-head">
          <span>
            <span class="match-name">${i+1}. ${m.song.title}</span>
            <span class="match-artist">${m.song.artist}</span>
          </span>
          <span class="match-pct ${cls}">${m.score}% <span style="font-size:10px;font-weight:600;">· ${scoreLabel(m.score)}</span></span>
        </div>
        <div class="bar-track"><div class="bar-fill" id="bar-${i}"></div></div>
        <div class="reason-list">
          ${m.reasons.length
            ? m.reasons.map(r => `<span class="reason-chip"><b>+${r.pts}%</b> ${r.label}</span>`).join('')
            : `<span class="reason-chip">Only a loose stylistic overlap — lowest-confidence pick of the batch</span>`}
        </div>
      `;
      matchList.appendChild(card);
      setTimeout(() => {
        const bar = card.querySelector(`#bar-${i}`);
        if (bar) bar.style.width = m.score + '%';
      }, 200 + i*150);
    });

    runBtn.disabled = false;
    runBtn.textContent = `Run it again on "${s.title}" 🔁`;
    hint.textContent = 'Done! Scroll up to try a different song, or search the catalog.';
  }, 250 + steps.length*550 + 300);
}
