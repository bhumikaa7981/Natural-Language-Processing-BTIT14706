<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lyric Whisperer — NLP Playlist Demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFF8FB;
    --panel:#FFFFFF;
    --panel-2:#F8EFFF;
    --pink:#FFA9D9;
    --pink-dark:#E0559E;
    --yellow:#FFE08A;
    --yellow-dark:#C98A12;
    --teal:#9CF3E0;
    --teal-dark:#0E9C86;
    --purple:#C9B6FF;
    --purple-dark:#7C4FE0;
    --text:#3D2C5C;
    --muted:#8E7FAE;
    --line:#EDDFFC;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 8% 8%, rgba(255,169,217,0.45), transparent 40%),
      radial-gradient(circle at 92% 15%, rgba(156,243,224,0.45), transparent 42%),
      radial-gradient(circle at 50% 100%, rgba(201,182,255,0.45), transparent 45%),
      var(--bg);
    color:var(--text);
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    padding:32px 20px 80px;
  }
  .wrap{max-width:980px;margin:0 auto;}

  /* HEADER */
  header{text-align:center;margin-bottom:36px;}
  .eyebrow{
    display:inline-flex;align-items:center;gap:8px;
    font-family:'JetBrains Mono',monospace;font-size:12px;
    letter-spacing:.12em;text-transform:uppercase;color:var(--teal-dark);
    background:rgba(14,156,134,0.10);border:1px solid rgba(14,156,134,0.35);
    padding:6px 14px;border-radius:999px;margin-bottom:18px;
  }
  h1{
    font-family:'Baloo 2',cursive;font-weight:800;
    font-size:clamp(34px,6vw,58px);margin:0 0 10px;line-height:1.05;
    background:linear-gradient(90deg,var(--pink-dark),var(--purple-dark) 50%,var(--teal-dark));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .sub{color:var(--muted);font-size:16px;max-width:560px;margin:0 auto;}

  /* LANG TABS */
  .tabs{display:flex;justify-content:center;gap:10px;margin:32px 0 18px;}
  .tab{
    font-family:'Baloo 2',cursive;font-weight:700;font-size:16px;
    padding:10px 22px;border-radius:999px;border:2px solid var(--line);
    background:var(--panel);color:var(--muted);cursor:pointer;transition:.2s;
  }
  .tab.active{border-color:var(--pink-dark);color:var(--text);
    background:linear-gradient(135deg,rgba(255,169,217,0.45),rgba(201,182,255,0.45));
    box-shadow:0 0 0 4px rgba(255,169,217,0.25);
  }
  .tab:hover{color:var(--text);}

  /* SONG GRID */
  .grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));
    gap:12px;margin-bottom:8px;
  }
  .song-card{
    background:var(--panel);border:2px solid var(--line);border-radius:16px;
    padding:14px 16px;cursor:pointer;text-align:left;transition:.18s;
    display:flex;flex-direction:column;gap:2px;
    box-shadow:0 2px 10px rgba(124,79,224,0.06);
  }
  .song-card:hover{transform:translateY(-3px);border-color:var(--purple-dark);}
  .song-card.selected{
    border-color:var(--yellow-dark);
    background:linear-gradient(135deg,rgba(255,224,138,0.35),rgba(255,169,217,0.25));
    box-shadow:0 6px 20px rgba(255,224,138,0.35);
  }
  .song-title{font-weight:600;font-size:14.5px;}
  .song-artist{font-size:12.5px;color:var(--muted);}

  /* RUN BUTTON */
  .run-row{display:flex;justify-content:center;margin:30px 0 10px;}
  .run-btn{
    font-family:'Baloo 2',cursive;font-weight:700;font-size:18px;
    padding:14px 34px;border-radius:999px;border:none;cursor:pointer;
    background:linear-gradient(90deg,var(--pink-dark),var(--purple-dark));color:white;
    box-shadow:0 8px 26px rgba(224,85,158,0.35);transition:.2s;
  }
  .run-btn:disabled{
    background:var(--panel-2);color:var(--muted);box-shadow:none;cursor:not-allowed;
  }
  .run-btn:not(:disabled):hover{transform:translateY(-2px) scale(1.02);}

  /* PIPELINE */
  .pipeline{margin-top:38px;display:flex;flex-direction:column;gap:18px;}
  .step{
    background:var(--panel);border:2px solid var(--line);border-radius:20px;
    padding:22px 24px;opacity:0;transform:translateY(16px);
    transition:opacity .5s ease, transform .5s ease;
    box-shadow:0 2px 14px rgba(124,79,224,0.06);
  }
  .step.show{opacity:1;transform:translateY(0);}
  .step-head{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .step-num{
    font-family:'JetBrains Mono',monospace;font-size:12px;color:white;
    background:var(--teal-dark);width:28px;height:28px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;
  }
  .step-title{font-family:'Baloo 2',cursive;font-weight:700;font-size:19px;}
  .step-quip{color:var(--muted);font-size:13.5px;margin:-8px 0 14px 40px;}

  .chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-left:40px;}
  .chip{
    font-family:'JetBrains Mono',monospace;font-size:12.5px;
    padding:6px 12px;border-radius:8px;background:var(--panel-2);
    border:1px solid var(--line);color:var(--text);
  }
  .chip.fade{opacity:.35;}

  .tagline-box{
    margin-left:40px;background:var(--panel-2);border-left:3px solid var(--purple-dark);
    border-radius:8px;padding:10px 14px;font-size:13.5px;color:var(--muted);font-style:italic;
  }

  .pill{
    display:inline-block;font-weight:600;font-size:14px;padding:7px 16px;
    border-radius:999px;margin:2px 6px 2px 0;
  }
  .pill-theme{background:rgba(201,182,255,0.35);color:var(--purple-dark);border:1px solid var(--purple);}
  .pill-mood{background:rgba(255,169,217,0.35);color:var(--pink-dark);border:1px solid var(--pink);}
  .pill-emotion{background:rgba(255,224,138,0.45);color:var(--yellow-dark);border:1px solid var(--yellow);}
  .pill-keyword{background:rgba(156,243,224,0.40);color:var(--teal-dark);border:1px solid var(--teal);}

  .pill-row{margin-left:40px;display:flex;flex-wrap:wrap;gap:2px;}

  /* OUTPUT */
  .output{
    margin-top:8px;border-radius:22px;padding:28px;
    background:linear-gradient(135deg,rgba(255,169,217,0.30),rgba(156,243,224,0.30));
    border:2px solid var(--yellow-dark);
  }
  .output h2{font-family:'Baloo 2',cursive;margin:0 0 4px;font-size:24px;}
  .output .sub2{color:var(--muted);font-size:13.5px;margin-bottom:18px;}
  .playlist-card{
    display:flex;align-items:center;gap:16px;background:var(--panel);
    border-radius:16px;padding:16px 18px;margin-bottom:18px;border:1px solid var(--line);
  }
  .art{
    width:56px;height:56px;border-radius:12px;flex-shrink:0;
    background:linear-gradient(135deg,var(--pink),var(--purple),var(--teal));
    display:flex;align-items:center;justify-content:center;font-size:24px;
  }
  .playlist-name{font-family:'Baloo 2',cursive;font-weight:700;font-size:18px;}
  .playlist-desc{color:var(--muted);font-size:13px;}
  .sim-title{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.08em;
    text-transform:uppercase;color:var(--teal-dark);margin-bottom:10px;}
  .sim-list{display:flex;flex-direction:column;gap:8px;}
  .sim-item{
    display:flex;justify-content:space-between;background:var(--panel-2);
    padding:10px 14px;border-radius:10px;font-size:13.5px;
  }
  .sim-item span:last-child{color:var(--muted);}
  .match{color:var(--teal-dark);font-family:'JetBrains Mono',monospace;font-weight:600;}

  .hint{text-align:center;color:var(--muted);font-size:13px;margin-top:10px;}

  @media (max-width:520px){
    .step-quip,.chip-row,.pill-row,.tagline-box{margin-left:0;}
    .step-head{gap:10px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">🎧 how streaming apps read your feelings</div>
    <h1>Lyric Whisperer</h1>
    <p class="sub">Feed it a trending song. Watch the NLP model sniff out the theme, catch the mood, and quietly build you a playlist — no therapist required.</p>
  </header>

  <div class="tabs">
    <button class="tab active" data-lang="en">🇬🇧 English · Trending 10</button>
    <button class="tab" data-lang="hi">🇮🇳 Hindi · Latest 10</button>
  </div>

  <div class="grid" id="songGrid"></div>

  <div class="run-row">
    <button class="run-btn" id="runBtn" disabled>Pick a song first 🎵</button>
  </div>
  <p class="hint" id="hint">Tap a song above to load it into the model.</p>

  <div class="pipeline" id="pipeline"></div>

</div>

<script>
const SONGS = {
  en: [
    {title:"Anti-Hero", artist:"Taylor Swift", theme:"self-doubt & self-reckoning", mood:"Introspective", emotions:["anxious 😬","self-aware 🪞","wry 😏"], keywords:["monster","midnights","mirror","shrink"], vibe:"Every party I throw, I turn into the thing I was scared of.", playlist:"Overthinking O'Clock 🌙", desc:"For 2am spirals with impeccable production."},
    {title:"As It Was", artist:"Harry Styles", theme:"nostalgia & letting go", mood:"Bittersweet", emotions:["wistful 🥲","fond 💭","a little numb 😶"], keywords:["Harry's house","nothing's the same","seventies","fine"], vibe:"You know it's not the same as it was, in this world it's just us.", playlist:"Golden Hour Goodbyes 🌇", desc:"Nostalgia you can dance badly to."},
    {title:"Flowers", artist:"Miley Cyrus", theme:"self-love & independence", mood:"Empowered", emotions:["confident 💪","liberated 🕊️","unbothered 😎"], keywords:["can buy myself","flowers","talk to myself","better"], vibe:"I can love me better than you can, baby.", playlist:"Main Character Energy 💅", desc:"Solo dance-party, no plus-one required."},
    {title:"Cruel Summer", artist:"Taylor Swift", theme:"secret longing", mood:"Yearning", emotions:["giddy 🙈","nervous 💗","hopeful ✨"], keywords:["cruel","secret","devil","fever dream"], vibe:"I'm drunk in the back of the car, and I cried like a baby coming home.", playlist:"Golden Hour Goodbyes 🌇", desc:"Summer feelings that hit a little too hard."},
    {title:"Espresso", artist:"Sabrina Carpenter", theme:"playful magnetism", mood:"Flirty", emotions:["cheeky 😏","breezy 🍹","confident 💃"], keywords:["espresso","that's that me","sleep","mountain dew"], vibe:"I'm working late 'cause I'm a singer, one touch and I'm a sinner.", playlist:"Confidence In A Can 🥤", desc:"For strutting to the mailbox like it's a runway."},
    {title:"Die With A Smile", artist:"Lady Gaga & Bruno Mars", theme:"love against the clock", mood:"Tender", emotions:["devoted 🥹","urgent ❤️‍🔥","warm 🫶"], keywords:["world ends","smile","hold you","last night"], vibe:"If the world was ending, I'd wanna be next to you.", playlist:"Slow Dance In The Kitchen 🕯️", desc:"Built for last dances and long hugs."},
    {title:"Good Luck, Babe!", artist:"Chappell Roan", theme:"denial & desire", mood:"Defiant", emotions:["frustrated 😤","yearning 💔","sharp-tongued 🗣️"], keywords:["good luck","forget me","label","dizzy"], vibe:"You'd have to stop the world just to stop the feeling.", playlist:"Plot Twist Playlist 🔄", desc:"For processing feelings you didn't ask for."},
    {title:"Birds of a Feather", artist:"Billie Eilish", theme:"devotion & fragility", mood:"Dreamy", emotions:["besotted 🥰","fragile 🫧","content 😌"], keywords:["birds","feather","stay","flock together"], vibe:"I don't think I could love you more, it might not be enough.", playlist:"Slow Dance In The Kitchen 🕯️", desc:"Soft, floaty, dangerously romantic."},
    {title:"Beautiful Things", artist:"Benson Boone", theme:"fear of losing joy", mood:"Anxious-hopeful", emotions:["grateful 🙏","scared 😰","tender 💛"], keywords:["beautiful things","losing you","please","careful"], vibe:"I just wanna keep you, close your eyes, let's stay here for a while.", playlist:"Overthinking O'Clock 🌙", desc:"Gratitude with a side of dread — relatable."},
    {title:"Texas Hold 'Em", artist:"Beyoncé", theme:"freedom & togetherness", mood:"Rowdy-warm", emotions:["playful 🤠","free 🌾","joyful 😂"], keywords:["Texas","hold 'em","boots","hoedown"], vibe:"This ain't Texas, ain't no hold 'em, so lay your cards down.", playlist:"Barn-Door Karaoke 🤠", desc:"For pretending you know how to two-step."}
  ],
  hi: [
    {title:"Saiyaara", artist:"Faheem Abdullah, Tanishk Bagchi, Arslan Nizami · Saiyaara (2025)", theme:"falling in love against the odds", mood:"Swoony", emotions:["mesmerised 😍","tender 🥹","hopeful ✨"], keywords:["saiyaara","wanderer","star","home"], vibe:"You wandered into my life like a star that decided to stay.", playlist:"Slow Dance In The Kitchen 🕯️", desc:"Soft strings, softer heart."},
    {title:"Barbaad", artist:"Saiyaara OST (2025)", theme:"heartbreak after losing everything", mood:"Aching", emotions:["broken 💔","raw 😢","haunted 🌧️"], keywords:["barbaad","ruins","silence","ashes"], vibe:"Everything I built with you is standing in ruins, and I'm still standing here.", playlist:"Ugly-Cry Anthology 😭", desc:"Rainy window, one earbud, full spiral."},
    {title:"Humsafar", artist:"Saiyaara OST (2025)", theme:"companionship for the long haul", mood:"Warm", emotions:["devoted 🥰","safe 🫶","grateful 🙏"], keywords:["humsafar","safar","haath","hamesha"], vibe:"Walk with me — not ahead, not behind, just beside.", playlist:"Slow Dance In The Kitchen 🕯️", desc:"Wedding-hashtag material."},
    {title:"Aari Aari", artist:"Shashwat Sachdev · Dhurandhar: The Revenge (2026)", theme:"defiance & rebellion", mood:"Fierce", emotions:["angry 😤","unstoppable 🔥","electric ⚡"], keywords:["aari","badla","aag","jung"], vibe:"Come with your worst — I've already survived it once.", playlist:"Villain Era Anthems 🩸", desc:"For striding into a room like you own the plot."},
    {title:"Main Aur Tu", artist:"Shashwat Sachdev · Dhurandhar: The Revenge (2026)", theme:"loyalty amid chaos", mood:"Intense-tender", emotions:["protective 🛡️","loyal 🤝","quietly scared 😳"], keywords:["main aur tu","saath","vaada","toofan"], vibe:"In a world on fire, it's still just you and me keeping the promise.", playlist:"Plot Twist Playlist 🔄", desc:"For processing feelings you didn't ask for."},
    {title:"Qayde Se", artist:"Arijit Singh · Metro... In Dino (2025)", theme:"falling slowly, breaking all the rules", mood:"Playful-romantic", emotions:["nervous 😳","amused 😄","smitten 😍"], keywords:["qayde se","dil","kaayda","gustaakhi"], vibe:"Love clearly never read the rulebook, and now neither have I.", playlist:"Confidence In A Can 🥤", desc:"Sunshine energy, minor crush included."},
    {title:"Zamaana Lage", artist:"Arijit Singh, Shreya Ghoshal · Metro... In Dino (2025)", theme:"slow-burn love in a busy world", mood:"Wistful", emotions:["patient ⏳","fond 💭","a little tired 😌"], keywords:["zamaana","waqt","ruko","mila"], vibe:"It took the world a while to notice, but I saw you first.", playlist:"Golden Hour Goodbyes 🌇", desc:"For long drives and longer feelings."},
    {title:"Sitaare Zameen Par", artist:"Shankar-Ehsaan-Loy · Sitaare Zameen Par (2025)", theme:"joy & self-acceptance", mood:"Uplifting", emotions:["joyful 😂","proud 💪","free 🕊️"], keywords:["sitaare","zameen","apna","roshni"], vibe:"Some stars don't need the sky — they shine right here on the ground.", playlist:"Main Character Energy 💅", desc:"For pretending the sidewalk is a runway."},
    {title:"Param Sundari", artist:"Sachin-Jigar, Amitabh Bhattacharya · Param Sundari (2025)", theme:"playful obsession", mood:"Cheeky", emotions:["infatuated 🙈","giddy 😄","teasing 😏"], keywords:["param sundari","husn","deewana","nazar"], vibe:"Call it whatever you like — I've officially lost my mind over you.", playlist:"Barn-Door Karaoke 🤠", desc:"Chaotic-good relationship energy, danceable."},
    {title:"Tabaahi", artist:"Toxic (2026)", theme:"obsessive, toxic attraction", mood:"Dark-intense", emotions:["consumed 😵‍💫","addicted 🔥","unsettled 😬"], keywords:["tabaahi","nasha","zeher","jalna"], vibe:"I know this is ruin, and I'm walking straight into it anyway.", playlist:"Villain Era Anthems 🩸", desc:"For striding into a room like you own the plot."}
  ]
};

let currentLang = 'en';
let selectedSong = null;

const grid = document.getElementById('songGrid');
const runBtn = document.getElementById('runBtn');
const hint = document.getElementById('hint');
const pipeline = document.getElementById('pipeline');
const tabs = document.querySelectorAll('.tab');

function renderGrid(){
  grid.innerHTML = '';
  SONGS[currentLang].forEach((s, i)=>{
    const card = document.createElement('button');
    card.className = 'song-card';
    card.innerHTML = `<span class="song-title">${s.title}</span><span class="song-artist">${s.artist}</span>`;
    card.addEventListener('click', ()=>selectSong(i, card));
    grid.appendChild(card);
  });
}

function selectSong(i, el){
  document.querySelectorAll('.song-card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  selectedSong = SONGS[currentLang][i];
  runBtn.disabled = false;
  runBtn.textContent = `Run the NLP magic on "${selectedSong.title}" ✨`;
  hint.textContent = 'Model loaded. Hit the button and watch it work.';
  pipeline.innerHTML = '';
}

tabs.forEach(tab=>{
  tab.addEventListener('click', ()=>{
    tabs.forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentLang = tab.dataset.lang;
    selectedSong = null;
    runBtn.disabled = true;
    runBtn.textContent = 'Pick a song first 🎵';
    hint.textContent = 'Tap a song above to load it into the model.';
    pipeline.innerHTML = '';
    renderGrid();
  });
});

renderGrid();

runBtn.addEventListener('click', runPipeline);

function runPipeline(){
  if(!selectedSong) return;
  runBtn.disabled = true;
  pipeline.innerHTML = '';
  hint.textContent = 'Model is thinking... 🧠';

  const s = selectedSong;
  const tokens = s.vibe.replace(/[.,]/g,'').split(' ');

  const steps = [
    {
      title: 'Step 1 · Tokenize the lyrics',
      quip: 'First, it chops the words apart like confetti.',
      body: `<div class="tagline-box">Sample lyric vibe (illustrative): "${s.vibe}"</div>
             <div class="chip-row">${tokens.map(t=>`<span class="chip">${t}</span>`).join('')}</div>`
    },
    {
      title: 'Step 2 · Detect the theme',
      quip: 'It zooms out from words to "what is this song actually about."',
      body: `<div class="pill-row"><span class="pill pill-theme">🎯 ${s.theme}</span></div>`
    },
    {
      title: 'Step 3 · Read the mood & emotions',
      quip: 'Same as reading a room — but the room is 3 minutes of audio.',
      body: `<div class="pill-row">
               <span class="pill pill-mood">🌈 Mood: ${s.mood}</span>
             </div>
             <div class="pill-row" style="margin-top:8px;">
               ${s.emotions.map(e=>`<span class="pill pill-emotion">${e}</span>`).join('')}
             </div>`
    },
    {
      title: 'Step 4 · Pull out the keywords',
      quip: 'The words doing the heavy emotional lifting get flagged.',
      body: `<div class="pill-row">${s.keywords.map(k=>`<span class="pill pill-keyword">#${k}</span>`).join('')}</div>`
    }
  ];

  steps.forEach((st, idx)=>{
    const div = document.createElement('div');
    div.className = 'step';
    div.innerHTML = `
      <div class="step-head">
        <span class="step-num">${idx+1}</span>
        <span class="step-title">${st.title}</span>
      </div>
      <div class="step-quip">${st.quip}</div>
      ${st.body}
    `;
    pipeline.appendChild(div);
    setTimeout(()=>div.classList.add('show'), 250 + idx*550);
  });

  setTimeout(()=>{
    const out = document.createElement('div');
    out.className = 'output';
    const others = SONGS[currentLang].filter(x=>x.title!==s.title && x.playlist===s.playlist);
    const fallback = SONGS[currentLang].filter(x=>x.title!==s.title).slice(0,3);
    const sims = (others.length ? others : fallback).slice(0,3);
    out.innerHTML = `
      <h2>Step 5 · Output 🎉</h2>
      <div class="sub2">The model turns all that reading-between-the-lines into an actual playlist decision.</div>
      <div class="playlist-card">
        <div class="art">🎧</div>
        <div>
          <div class="playlist-name">Added to: ${s.playlist}</div>
          <div class="playlist-desc">${s.desc}</div>
        </div>
      </div>
      <div class="sim-title">Because you liked the vibe, here's what's queued next</div>
      <div class="sim-list">
        ${sims.map(sim=>`<div class="sim-item"><span>${sim.title} — ${sim.artist}</span><span class="match">${sim.mood} match</span></div>`).join('')}
      </div>
    `;
    pipeline.appendChild(out);
    setTimeout(()=>out.style.opacity='1', 50);
    out.style.opacity='0';
    out.style.transition='opacity .6s ease';
    setTimeout(()=>{out.style.opacity='1';}, 60);
    runBtn.disabled = false;
    runBtn.textContent = `Run it again on "${s.title}" 🔁`;
    hint.textContent = 'Done! Scroll up to try a different song.';
  }, 250 + steps.length*550 + 300);
}
</script>
</body>
</html>
